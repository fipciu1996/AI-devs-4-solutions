services:
  proxy-api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxy-api-server
    env_file:
      - ../.env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-18080}
      API_PATH: ${API_PATH:-/mcp}
      CONVERSATION_LOG_FILE: ${CONVERSATION_LOG_FILE:-conversation.log}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4.1-mini}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-30}
      OPENROUTER_SYSTEM_PROMPT: ${OPENROUTER_SYSTEM_PROMPT:-}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-proxy-api-server}
      MAX_CONTEXT_MESSAGES: ${MAX_CONTEXT_MESSAGES:-20}
      MAX_TOOL_ROUND_TRIPS: ${MAX_TOOL_ROUND_TRIPS:-8}
      PACKAGES_API_URL: ${PACKAGES_API_URL}
      PACKAGES_TIMEOUT_SECONDS: ${PACKAGES_TIMEOUT_SECONDS:-15}
    ports:
      - "${API_PORT:-18080}:${API_PORT:-18080}"
